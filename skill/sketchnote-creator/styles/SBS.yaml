# Machine-readable spec for SBS. Human overview: references/style-library.md
code: SBS
name: Sketchnote Blue Story
template: assets/SBS-Sketchnote-Blue-Story-template.jpg
use_for: [one insight, quote, emotional story, reflective lesson]
palette:
  paper: "#FFFFFF"
  ink: "#1F3C88" # navy ballpoint
typography:
  headline: handwritten, natural ballpoint stroke
  labels: handwritten, 2-5 words
composition:
  layout: one central metaphor, generous whitespace
  hierarchy: headline -> single metaphor illustration -> optional one-line takeaway
text_density: low # 1 insight only
line_quality: blue ballpoint pen sketch, single-pen line weight
failure_modes:
  - multiple metaphors or ideas crowding the page
  - whitespace filled with decorative noise
  - printed-looking fonts replacing handwriting
  - colors other than navy ink on white
