# Machine-readable spec for SB. Human overview: references/style-library.md
code: SB
name: Sketchnote Blue
template: assets/SB-Sketchnote-Blue-template.jpg
use_for: [multiple lessons, bullet recap, idea list]
palette:
  paper: "#FFFFFF"
  ink: "#1F3C88" # navy ballpoint
typography:
  title: handwritten, top of page
  bullets: handwritten labels, 2-5 words each
composition:
  layout: notebook page; title top, 3-6 bullets below, one metaphor icon per bullet
  hierarchy: title -> bullets in reading order
text_density: medium # 3-6 bullets max
line_quality: blue ballpoint pen sketch, single-pen line weight
failure_modes:
  - more than 6 bullets or long sentences per bullet
  - icons that decorate without meaning
  - dense layout with no breathing room
  - mixed ink colors
